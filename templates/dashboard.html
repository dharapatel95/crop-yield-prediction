<!DOCTYPE html>
<html>
<head>
    <title>Crop Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <style>
*{
    box-sizing:border-box;
    font-family:'Inter','Segoe UI',sans-serif;
    margin:0;
    padding:0;
}

/* ===== Body ===== */
body{
    min-height:100vh;
    background:linear-gradient(135deg,#dfeee5 0%, #c7e0d1 45%, #b8d4c2 100%);
    color:#1f2937;
    position:relative;
    overflow-x:hidden;
    font-size:16px;
    font-weight:700;
}

/* soft blobs */
body::before,
body::after{
    content:"";
    position:fixed;
    width:300px;
    height:300px;
    border-radius:50%;
    filter:blur(70px);
    z-index:-1;
    opacity:0.5;
}

body::before{
    background:#95c9aa;
    top:40px;
    right:80px;
}

body::after{
    background:#76b49b;
    bottom:50px;
    left:60px;
}

/* ===== Layout ===== */
.container{
    display:flex;
    min-height:100vh;
    gap:24px;
    padding:24px;
}

/* ===== Sidebar ===== */
.sidebar{
    width:280px;
    background:linear-gradient(180deg,#9fcbb0 0%, #86b89c 100%);
    border-radius:30px;
    padding:28px 22px;
    box-shadow:0 12px 24px rgba(0,0,0,0.06);
}

/* ===== Sidebar Title ===== */
.sidebar h2{
    font-size:34px;
    font-weight:900;
    margin-bottom:34px;
    color:#1f3f33;
    letter-spacing:0.3px;
}

/* ===== Sidebar Buttons ===== */
.menu button{
    width:100%;
    padding:16px 18px;
    margin-bottom:14px;
    border:none;
    border-radius:18px;
    background:rgba(255,255,255,0.65);
    color:#1f3f33;
    text-align:left;
    font-size:16px;
    font-weight:800;
    box-shadow:0 6px 14px rgba(0,0,0,0.04);
    transition:all 0.25s ease;
    cursor:pointer;
}

.menu button:hover{
    transform:translateX(5px);
    background:white;
}

/* ===== Main ===== */
.main{
    flex:1;
    background:rgba(255,255,255,0.28);
    backdrop-filter:blur(18px);
    border-radius:30px;
    padding:34px;
    box-shadow:0 10px 24px rgba(0,0,0,0.04);
}

/* ===== Welcome ===== */
.main p{
    font-size:22px;
    font-weight:800 !important;
    color:#214536 !important;
    margin-bottom:20px;
}

/* ===== Card ===== */
.card{
    background:rgba(255,255,255,0.42);
    backdrop-filter:blur(16px);
    border-radius:26px;
    padding:30px;
    box-shadow:0 8px 20px rgba(0,0,0,0.04);
}

.card h2{
    font-size:30px;
    font-weight:900;
    color:#214536;
    margin-bottom:40px;
}

/* ===== Form ===== */
#predictForm{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;
}

/* ===== Inputs ===== */
input,
select,
.select2-container--default .select2-selection--single{
    width:100%;
    height:56px !important;
    border:none !important;
    border-radius:18px !important;
    padding:0 16px !important;
    background:rgba(255,255,255,0.85) !important;
    color:#1f2937 !important;
    font-size:15px !important;
    font-weight:800 !important;
    box-shadow:0 4px 10px rgba(0,0,0,0.03);
}

/* placeholders */
input::placeholder{
    font-weight:700;
    color:#475569;
}

/* focus */
input:focus,
select:focus{
    outline:none;
    box-shadow:0 0 0 3px rgba(92,156,124,0.18);
}

/* ===== Select2 ===== 
.select2-container{
    width:100% !important;
}

.select2-container--default .select2-selection--single{
    width:100% !important;
    height:56px !important;
    border:none !important;
    border-radius:18px !important;
    padding:0 50px 0 16px !important;
    background:rgba(255,255,255,0.85) !important;
    box-shadow:0 4px 10px rgba(0,0,0,0.03);
    position:relative;
}

/* selected text */
.select2-selection__rendered{
    line-height:56px !important;
    font-weight:800 !important;
    color:#1f2937 !important;
    padding-left:0 !important;
}

/* clear button */
.select2-container--default .select2-selection__clear{
    position:absolute !important;
    right:28px !important;
    top:50% !important;
    transform:translateY(-50%);
    font-size:18px !important;
    color:#1f4d3a !important;
    cursor:pointer;
    z-index:2;
}

/* dropdown arrow */
.select2-container--default .select2-selection__arrow{
    position:absolute !important;
    right:10px !important;
    top:50% !important;
    transform:translateY(-50%);
    height:auto !important;
}

/* dropdown box */
.select2-dropdown{
    border:none !important;
    border-radius:18px !important;
    overflow:hidden;
    box-shadow:0 10px 22px rgba(0,0,0,0.08);
    background:white !important;
}

/* search area */
.select2-search--dropdown{
    padding:12px !important;
    background:white !important;
}

/* IMPORTANT FIX */
.select2-container .select2-search__field{
    width:100% !important;
    height:42px !important;
    border:none !important;
    outline:none !important;
    border-radius:12px !important;
    padding:10px 14px !important;
    font-size:14px !important;
    font-weight:600 !important;
    color:#1f2937 !important;
    background:#f8fafc !important;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

/* placeholder */
.select2-search__field::placeholder{
    color:#94a3b8 !important;
}

/* options */
.select2-results__option{
    padding:12px 16px !important;
    font-size:15px !important;
    font-weight:700 !important;
}

/* hover */
.select2-results__option--highlighted{
    background:#86b89c !important;
    color:white !important;
}/*
/* ===== Buttons ===== */
.submit{
    border:none;
    border-radius:18px;
    padding:14px 24px;
    background:linear-gradient(135deg,#245b45,#4f8a6f);
    color:white;
    font-size:15px;
    font-weight:900;
    box-shadow:0 10px 20px rgba(36,91,69,0.14);
    cursor:pointer;
    transition:all 0.25s ease;
}

.submit:hover{
    transform:translateY(-2px);
}

button[type="button"]{
    border:none;
    border-radius:18px;
    padding:14px 20px;
    background:linear-gradient(135deg,#d6eadc,#b8d8c2);
    color:#214536;
    font-size:15px;
    font-weight:800;
    box-shadow:0 6px 14px rgba(0,0,0,0.04);
    cursor:pointer;
}

/* ===== Result ===== */
#resultBox,
#graphSection{
    margin-top:24px;
    background:rgba(255,255,255,0.45);
    border-radius:22px;
    padding:22px;
    box-shadow:0 8px 18px rgba(0,0,0,0.03);
}

/* ===== Mobile ===== */
@media(max-width:768px){
    .container{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
    }

    #predictForm{
        grid-template-columns:1fr;
    }
}

/* ===== History Table Premium ===== */
.history-card{
    margin-top:20px;
    padding:28px;
}

.history-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.history-top h2{
    margin:0;
    font-size:28px;
    font-weight:800;
    color:#1f4d3a;
}

.history-badge{
    padding:10px 16px;
    border-radius:14px;
    background:rgba(255,255,255,0.65);
    font-size:14px;
    font-weight:700;
    color:#475569;
}

.table-wrapper{
    overflow-x:auto;
    border-radius:20px;
}

.history-table{
    width:100%;
    border-collapse:separate;
    border-spacing:0 12px;
}

.history-table th{
    text-align:left;
    padding:14px 16px;
    font-size:14px;
    font-weight:800;
    color:#1f4d3a;
}

.history-table td{
    padding:18px 16px;
    font-size:14px;
    font-weight:600;
    color:#334155;
    background:rgba(255,255,255,0.75);
}

.history-table tr td:first-child{
    border-top-left-radius:16px;
    border-bottom-left-radius:16px;
}

.history-table tr td:last-child{
    border-top-right-radius:16px;
    border-bottom-right-radius:16px;
}

.history-table tr{
    transition:all 0.3s ease;
}

.history-table tbody tr:hover,
.history-table tr:hover{
    transform:translateY(-2px);
}

@media(max-width:768px){
    .history-top{
        flex-direction:column;
        align-items:flex-start;
        gap:12px;
    }
}


/* ===== Help Page ===== */
.help-card{
    padding:30px;
}

.help-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:24px;
}

.help-header h2{
    margin:0;
    font-size:30px;
    font-weight:800;
    color:#1f4d3a;
}

.help-badge{
    padding:10px 16px;
    border-radius:14px;
    background:rgba(255,255,255,0.7);
    font-size:14px;
    font-weight:700;
    color:#475569;
}

.help-section,
.help-note{
    margin-bottom:20px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.55);
    box-shadow:0 6px 16px rgba(0,0,0,0.03);
}

.help-section h3,
.help-note h3{
    margin-top:0;
    font-size:20px;
    font-weight:800;
    color:#1f4d3a;
}

.help-section ul{
    margin:0;
    padding-left:22px;
}

.help-section li{
    margin-bottom:10px;
    font-size:15px;
    font-weight:600;
    color:#334155;
    line-height:1.6;
}

.help-note p{
    margin:0;
    font-size:15px;
    font-weight:600;
    color:#475569;
    line-height:1.7;
}

.back-btn{
    border:none;
    border-radius:16px;
    padding:14px 20px;
    font-size:15px;
    font-weight:700;
    background:linear-gradient(135deg,#d8f3dc,#b7e4c7);
    color:#1f4d3a;
    cursor:pointer;
    transition:all 0.3s ease;
}

.back-btn:hover{
    transform:translateY(-2px);
}


/* ===== Harvest Planner ===== */
.planner-card{
    padding:30px;
}

.planner-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:16px;
}

.planner-header h2{
    margin:0;
    font-size:30px;
    font-weight:800;
    color:#1f4d3a;
}

.planner-badge{
    padding:10px 16px;
    border-radius:14px;
    background:rgba(255,255,255,0.7);
    font-size:14px;
    font-weight:700;
    color:#475569;
}

.planner-subtitle{
    font-size:15px;
    font-weight:600;
    color:#64748b;
    margin-bottom:22px;
}

.planner-input-box{
    background:rgba(255,255,255,0.55);
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
}

.planner-input-box label{
    display:block;
    margin-bottom:10px;
    font-size:15px;
    font-weight:700;
    color:#1f4d3a;
}

.planner-input-box input{
    width:100%;
    height:56px;
    border:none;
    border-radius:16px;
    padding:0 16px;
    font-size:15px;
    font-weight:600;
    background:rgba(255,255,255,0.85);
}

.planner-btn-row{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    margin-bottom:24px;
}

.planner-btn{
    border:none;
    border-radius:16px;
    padding:14px 22px;
    font-size:15px;
    font-weight:700;
    background:linear-gradient(135deg,#1f4d3a,#3c8c63);
    color:white;
    cursor:pointer;
    transition:all 0.3s ease;
}

.planner-btn:hover{
    transform:translateY(-2px);
}

.planner-result{
    margin-top:18px;
    padding:22px;
    border-radius:20px;
    background:rgba(255,255,255,0.55);
    box-shadow:0 6px 16px rgba(0,0,0,0.03);
    font-size:15px;
    font-weight:600;
    line-height:1.8;
    color:#334155;
}

.chart-box{
    margin-top:24px;
    padding:22px;
    border-radius:22px;
    background:rgba(255,255,255,0.45);
    box-shadow:0 6px 16px rgba(0,0,0,0.03);
}

@media(max-width:768px){
    .planner-header{
        flex-direction:column;
        align-items:flex-start;
        gap:12px;
    }

    .planner-btn-row{
        flex-direction:column;
    }

    /* ===== FINAL SELECT2 SEARCH FIX ===== */
.select2-dropdown .select2-search {
    padding: 8px !important;
    margin: 0 !important;
    background: white !important;
}

.select2-dropdown .select2-search__field {
    all: unset;
    display: block !important;
    width: 100% !important;
    box-sizing: border-box !important;
    height: 42px !important;
    padding: 10px 14px !important;
    border-radius: 12px !important;
    background: #f8fafc !important;
    font-size: 14px !important;
    font-weight: 600 !important;
    color: #1f2937 !important;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05) !important;
}

/* remove extra white gap */
.select2-results {
    margin-top: 0 !important;
    padding-top: 0 !important;
}
}








.welcome-banner{
    margin-bottom:30px;
}

.welcome-text{
    margin-bottom:22px;
}

.welcome-text h2{
    font-size:34px;
    font-weight:800;
    color:#214536;
    margin-bottom:8px;
}

.welcome-text p{
    font-size:16px;
    font-weight:600;
    color:#5b6b63;
}

.stats-row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.stat-card{
    background:rgba(255,255,255,0.35);
    backdrop-filter:blur(16px);
    border-radius:22px;
    padding:24px;
    box-shadow:0 10px 24px rgba(0,0,0,0.05);
    border:1px solid rgba(255,255,255,0.3);
    transition:0.3s;
}

.stat-card:hover{
    transform:translateY(-4px);
    box-shadow:0 14px 28px rgba(0,0,0,0.08);
}

.stat-card h3{
    font-size:18px;
    font-weight:800;
    margin-bottom:10px;
    color:#214536;
}

.stat-card p{
    font-size:22px;
    font-weight:800;
    color:#2d6a4f;
}

/* ===== FINAL SELECT2 DROPDOWN FIX ===== */
.select2-container--open .select2-dropdown {
    margin-top: 6px !important;
    border-radius: 18px !important;
    overflow: hidden !important;
    background: white !important;
    box-shadow: 0 10px 22px rgba(0,0,0,0.08) !important;
}

.select2-search--dropdown {
    padding: 8px !important;
    background: white !important;
}

.select2-search--dropdown .select2-search__field {
    width: 100% !important;
    height: 40px !important;
    padding: 8px 12px !important;
    border: 1px solid #e2e8f0 !important;
    border-radius: 10px !important;
    background: #f8fafc !important;
    box-sizing: border-box !important;
    margin: 0 !important;
}

.select2-results {
    max-height: 220px !important;
    overflow-y: auto !important;
}

.select2-results__options {
    max-height: 220px !important;
}
</style>
</head>

const form = document.getElementById("predictForm");

        fetch("", {

        })

                        <p style="font-size:22px; font-weight:bold;">
${Number(data.result).toFixed(2)} tons/hectare                        </p>

                `;

                        html += `<li>${item}</li>`;
                    });
                    html += `</ul>`;
                }

                document.getElementById("resultBox").innerHTML = html;
            } else {
    document.getElementById("resultBox").innerHTML =
        `<span style='color:red'>❌ ${data.error} Something is want wrong.</span>`;
}

let chartInstance;

function planHarvest() {

    let yieldPerHa = parseFloat(localStorage.getItem("predictedYield"));
    let cropName = localStorage.getItem("cropName") || "";
    let season = (localStorage.getItem("seasonName") || "").toLowerCase();
    let area = parseFloat(localStorage.getItem("areaValue") || 1);

    if (!yieldPerHa) {
        alert("No prediction found. Please predict first.");
        return;
    }

    let totalYield = yieldPerHa * area;

    let inputDate = document.getElementById("harvestDate").value;

    if (!inputDate) {
        alert("Select sowing date first");
        return;
    }

    let parts = inputDate.split("-");
    let sowingDate = new Date(parts[0], parts[1] - 1, parts[2]);

    // Get crop configuration
    const config = cropConfig[cropName] || {
        maturityDays: 90,
        harvestSlots: 2
    };

    let maturityDays = config.maturityDays;
    let harvestCount = config.harvestSlots;

    let firstHarvestDate = new Date(sowingDate);
    firstHarvestDate.setDate(
        firstHarvestDate.getDate() + maturityDays
    );

    // interval between harvests
    let intervalDays = 7;

    if (harvestCount === 1) {
        intervalDays = 0;
    } else if (season === "whole year") {
        intervalDays = 20;
    } else {
        intervalDays = 10;
    }

    // Yield distribution weights
    let weights = [];

if (harvestCount === 1) {
    weights = [1];
}
else if (harvestCount === 2) {
    weights = [0.45, 0.55];
}
else if (harvestCount === 3) {
    weights = [0.25, 0.45, 0.30];
}
else if (harvestCount === 4) {
    weights = [0.18, 0.32, 0.28, 0.22];
}
else {
    let remaining = 1;
    for (let i = 0; i < harvestCount; i++) {
        let randomWeight =
            0.15 + Math.random() * 0.15;

        weights.push(randomWeight);
        remaining -= randomWeight;
    }

    let sum = weights.reduce((a, b) => a + b, 0);
    weights = weights.map(w => w / sum);
}   

    let html = `
        <h4>📦 Harvest Plan</h4>
        <p>🌱 Sowing Date: ${sowingDate.toDateString()}</p>
        <p>⏳ Harvest After: ${maturityDays} days</p>
    `;

    let chartLabels = [];
    let chartValues = [];

    for (let i = 0; i < harvestCount; i++) {

        let date = new Date(firstHarvestDate);
        date.setDate(
            date.getDate() + (i * intervalDays)
        );

        let yieldPart = +(
            totalYield * weights[i]
        ).toFixed(2);

        html += `
            <p>📅 ${date.toDateString()} → 🌾 ${yieldPart} tons</p>
        `;

        chartLabels.push(date.toDateString());
        chartValues.push(yieldPart);
    }

    document.getElementById("harvestResult").innerHTML = html;

    drawHarvestGraph(chartLabels, chartValues);
}

function drawHarvestGraph(labels, values) {
    const ctx = document.getElementById('harvestChart').getContext('2d');

    if(chartInstance){
        chartInstance.destroy();
    }

    chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Harvest Yield (tons)',
                data: values,
                tension: 0.4,
                fill: true
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    labels: {
                        color: 'gray'
                    }
                }
            },
            scales: {
                x: {
                    ticks: {
                        color: 'gray'
                    }
                },
                y: {
                    ticks: {
                        color: 'gray'
                    }
                }
            }
        }
    });
}

function setAllowedSowingMonths() {
    const cropName = localStorage.getItem("cropName") || "";
    const dateInput = document.getElementById("harvestDate");

    if (!dateInput) return;

    const config = cropConfig[cropName];

    if (!config) return;

    const allowedMonths = config.sowMonths;
    const currentYear = new Date().getFullYear();

    const minMonth = Math.min(...allowedMonths);
    const maxMonth = Math.max(...allowedMonths);

    dateInput.min = `${currentYear}-${String(minMonth).padStart(2, "0")}-01`;
    dateInput.max = `${currentYear}-${String(maxMonth).padStart(2, "0")}-31`;

    dateInput.addEventListener("input", function () {
        const selectedMonth = new Date(this.value).getMonth() + 1;

        if (!allowedMonths.includes(selectedMonth)) {
            this.value = "";
        }
    });
}
