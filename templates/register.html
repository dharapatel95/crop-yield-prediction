<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            background: linear-gradient(135deg, #1f2937, #111827);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI';
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            padding: 30px;
            width: 350px;
            color: white;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        input {
            background: rgba(255, 255, 255, 0.187) !important;
            border: none !important;
            color: white !important;
        }

        input::placeholder {
            color: #aaa;
        }

        .btn-custom {
            background: #4ade80;
            border: none;
            color: black;
            font-weight: bold;
        }

        .btn-custom:hover {
            background: #22c55e;
        }

        a {
            color: #4ade80;
            text-decoration: none;
        }
    </style>
</head>
</body>
<div class="card">
    <h3 class="text-center mb-4">🌾 Crop Prediction</h3>
        {% if error %}
            <div class="alert alert-danger p-2">{{ error }}</div>
        {% endif %}

<form method="POST">
    {% csrf_token %}
    <input name="username" placeholder="Username" class="form-control mb-3"><br>
    <input name="password" type="password" placeholder="Password" class="form-control mb-3"><br>
    <button type="submit" class="btn btn-custom w-100">Register</button>
</form>
<p class="text-center mt-3">
    Already have account? <a href="/login">Login</a>
</p>
</html>
