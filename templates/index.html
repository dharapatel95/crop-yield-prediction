<!DOCTYPE html>
<html>
<head>
    <title>Crop Yield Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">🌾 Crop Yield Prediction</span>

    <div>
      <a href="{% url 'home' %}" class="btn btn-light">Home</a>
      <a href="{% url 'history' %}" class="btn btn-warning">History</a>
      <a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>
    </div>
  </div>
</nav>
</head>
<body class="container mt-5">

<h2 class="mb-4">🌾 Crop Yield Prediction</h2>
<h4>Welcome {{ request.user.username }}</h4>
<a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>
{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="POST" class="row g-3">
  {% csrf_token %}

  <div class="col-md-4"><input class="form-control" name="crop" placeholder="Crop" required></div>
  <div class="col-md-4"><input class="form-control" name="season" placeholder="Season" required></div>
  <div class="col-md-4"><input class="form-control" name="state" placeholder="State" required></div>

  <div class="col-md-4"><input class="form-control" name="area" placeholder="Area" required></div>
  <div class="col-md-4"><input class="form-control" name="production" placeholder="Production" required></div>
  <div class="col-md-4"><input class="form-control" name="fertilizer" placeholder="Fertilizer" required></div>

  <div class="col-md-4"><input class="form-control" name="pesticide" placeholder="Pesticide" required></div>
  <div class="col-md-4"><input class="form-control" name="avg_temp" placeholder="Temperature" required></div>
  <div class="col-md-4"><input class="form-control" name="rainfall" placeholder="Rainfall" required></div>

  <div class="col-md-4"><input class="form-control" name="humidity" placeholder="Humidity" required></div>
  <div class="col-md-4"><input class="form-control" name="n" placeholder="N" required></div>
  <div class="col-md-4"><input class="form-control" name="p" placeholder="P" required></div>

  <div class="col-md-4"><input class="form-control" name="k" placeholder="K" required></div>
  <div class="col-md-4"><input class="form-control" name="ph" placeholder="pH" required></div>

  <div class="col-12">
    <button class="btn btn-success">Predict</button>
  </div>

{% if result %}
<h3 class="mt-4 text-success">🌾 Predicted Yield: {{ result }}</h3>
{% endif %}
</form>

</body>
</html>
